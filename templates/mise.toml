[tasks.dev]
description = "Start all services"
run = "docker compose up -d && echo 'Ready at http://localhost'"

[tasks.down]
description = "Stop all services"
run = "docker compose down"

[tasks.restart]
description = "Restart all services"
run = "docker compose restart"

[tasks.build]
description = "Build production Docker image"
run = "docker build --target prod -t ${1:-laravel-app:latest} ."

[tasks.logs]
description = "Tail container logs"
run = "docker compose logs -f ${1:-app}"

[tasks.shell]
description = "Open a shell in the app container"
run = "docker compose exec app bash"

[tasks.artisan]
description = "Run an artisan command"
run = "docker compose exec app php artisan"

[tasks.migrate]
description = "Run database migrations"
run = "docker compose exec app php artisan migrate"

[tasks.migrate-fresh]
description = "Drop all tables and re-run migrations"
run = "docker compose exec app php artisan migrate:fresh"

[tasks.seed]
description = "Run database seeders"
run = "docker compose exec app php artisan db:seed"

[tasks.tinker]
description = "Open Laravel Tinker REPL"
run = "docker compose exec app php artisan tinker"

[tasks.test]
description = "Run test suite"
run = "docker compose exec app php artisan test"

[tasks.test-coverage]
description = "Run tests with coverage"
run = "docker compose exec -e XDEBUG_MODE=coverage app php artisan test --coverage"

[tasks.composer]
description = "Run a Composer command"
run = "docker compose exec app composer"

[tasks.bun]
description = "Run a Bun command"
run = "docker compose exec app bun"

[tasks.frontend]
description = "Start Vite dev server"
run = "docker compose exec app bun run dev"

[tasks.format]
description = "Run Laravel Pint code formatter"
run = "docker compose exec app ./vendor/bin/pint"
