name: "${APP_NAME:-laravel}"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        USER_UID: "${USER_UID:-1000}"
        USER_GID: "${USER_GID:-1000}"
    ports:
      - "${APP_PORT:-80}:80"
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/app
      - vendor:/app/vendor           # named volume for performance (avoids slow bind mount on macOS)
      - node_modules:/app/node_modules # same as above
    environment:
      APP_ENV: "${APP_ENV:-local}"
      SERVER_NAME: ":80"
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: "${DB_DATABASE:-laravel}"
      POSTGRES_USER: "${DB_USERNAME:-laravel}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-bookworm
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    command: server /data --console-address ":9001"
    environment:
      RUSTFS_ROOT_USER: "${AWS_ACCESS_KEY_ID:-laravel}"
      RUSTFS_ROOT_PASSWORD: "${AWS_SECRET_ACCESS_KEY:-laravelS3secret}"
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://localhost:9000 | grep -q 403"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot: creates the default S3 bucket on first startup
  rustfs-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://rustfs:9000 $${AWS_ACCESS_KEY_ID} $${AWS_SECRET_ACCESS_KEY} &&
      mc mb --ignore-existing local/$${AWS_BUCKET} &&
      echo 'Bucket ready: '$${AWS_BUCKET}
      "
    environment:
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-laravel}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-laravelS3secret}"
      AWS_BUCKET: "${AWS_BUCKET:-laravel}"

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  vendor:
  node_modules:
